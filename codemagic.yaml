workflows:
  # Production iOS - signed .ipa + TestFlight
  # Requires env group "code-signing" with App Store Connect + CERTIFICATE_PRIVATE_KEY
  # See: CODEMAGIC_SIGNING_FIX.md
  ios-production:
    name: iOS Production Build (TestFlight/App Store)
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "com.siozostheoharis.getfit"
        APPLE_TEAM_ID: "K4A6LP6V3P"
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        APP_STORE_CONNECT_PRIVATE_KEY_BASE64: $APP_STORE_CONNECT_PRIVATE_KEY_BASE64
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY_BASE64: $CERTIFICATE_PRIVATE_KEY_BASE64
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci

      - name: Build web assets
        script: npm run build:mobile

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update

      - name: Verify signing environment
        script: |
          set -e
          test -n "$APP_STORE_CONNECT_ISSUER_ID" || (echo "Missing APP_STORE_CONNECT_ISSUER_ID" && exit 1)
          test -n "$APP_STORE_CONNECT_KEY_IDENTIFIER" || (echo "Missing APP_STORE_CONNECT_KEY_IDENTIFIER" && exit 1)
          if [ -z "$APP_STORE_CONNECT_PRIVATE_KEY" ] && [ -z "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "Missing APP_STORE_CONNECT_PRIVATE_KEY or APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
            exit 1
          fi
          if [ -z "$CERTIFICATE_PRIVATE_KEY" ] && [ -z "$CERTIFICATE_PRIVATE_KEY_BASE64" ]; then
            echo "Missing CERTIFICATE_PRIVATE_KEY or CERTIFICATE_PRIVATE_KEY_BASE64"
            exit 1
          fi
          echo "Issuer: $APP_STORE_CONNECT_ISSUER_ID | Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER"

      - name: Install App Store Connect API key file
        script: |
          set -e
          mkdir -p "$HOME/.private_keys"
          P8_PATH="$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          if [ -n "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" ]; then
            echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" | base64 --decode > "$P8_PATH"
          else
            printf '%s' "$APP_STORE_CONNECT_PRIVATE_KEY" > "$P8_PATH"
          fi
          chmod 600 "$P8_PATH"
          test -s "$P8_PATH" || (echo "ERROR: empty API key file" && exit 1)
          grep -q "BEGIN PRIVATE KEY" "$P8_PATH" || (echo "ERROR: invalid .p8 format" && exit 1)
          echo "P8_KEY_PATH=$P8_PATH" >> "$CM_ENV"
          echo "API key installed (Key ID: $APP_STORE_CONNECT_KEY_IDENTIFIER, lines: $(wc -l < "$P8_PATH"))"

      - name: Test App Store Connect API
        script: |
          set -e
          P8_PATH="${P8_KEY_PATH:-$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8}"
          app-store-connect apps list --limit 1 \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$P8_PATH"
          echo "App Store Connect API authentication OK"

      - name: Fetch signing files from Apple
        script: |
          set -e
          P8_PATH="${P8_KEY_PATH:-$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8}"
          if [ -n "$CERTIFICATE_PRIVATE_KEY_BASE64" ]; then
            CERT_PATH="/tmp/ios_distribution_private_key.pem"
            echo "$CERTIFICATE_PRIVATE_KEY_BASE64" | base64 --decode > "$CERT_PATH"
            export CERTIFICATE_PRIVATE_KEY="$(cat "$CERT_PATH")"
          fi
          echo "Bundle ID: $BUNDLE_ID | Team: $APPLE_TEAM_ID"
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create \
            --verbose \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$P8_PATH"
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj

      - name: Build iOS App for App Store
        script: |
          set -e
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates

      - name: Export IPA for App Store
        script: |
          set -e
          cd ios/App
          cat > /tmp/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/export_options.plist \
            -exportPath build/ipa
          ls -la build/ipa/

      - name: Upload to TestFlight
        script: |
          set -e
          P8_PATH="${P8_KEY_PATH:-$HOME/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8}"
          IPA_PATH=$(find ios/App/build/ipa -name "*.ipa" | head -1)
          test -n "$IPA_PATH" || (echo "No IPA found" && exit 1)
          app-store-connect publish \
            --path "$IPA_PATH" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --key-id "$APP_STORE_CONNECT_KEY_IDENTIFIER" \
            --private-key "@file:$P8_PATH" \
            --testflight-beta-group "Beta Testers"
          echo "Uploaded to TestFlight: $IPA_PATH"

    artifacts:
      - ios/App/build/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - theoharis@getfitskg.com
        notify:
          success: true
          failure: true
      # TestFlight upload runs in "Upload to TestFlight" script (uses .p8 file, not multiline env)

  # Ad-hoc .ipa - install on registered devices (no App Store)
  ios-adhoc:
    name: iOS Ad Hoc Build (install on devices)
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.siozostheoharis.getfit"
        APPLE_TEAM_ID: "K4A6LP6V3P"
        APP_STORE_CONNECT_ISSUER_ID: $APP_STORE_CONNECT_ISSUER_ID
        APP_STORE_CONNECT_KEY_IDENTIFIER: $APP_STORE_CONNECT_KEY_IDENTIFIER
        APP_STORE_CONNECT_PRIVATE_KEY: $APP_STORE_CONNECT_PRIVATE_KEY
        APP_STORE_CONNECT_PRIVATE_KEY_BASE64: $APP_STORE_CONNECT_PRIVATE_KEY_BASE64
        CERTIFICATE_PRIVATE_KEY: $CERTIFICATE_PRIVATE_KEY
        CERTIFICATE_PRIVATE_KEY_BASE64: $CERTIFICATE_PRIVATE_KEY_BASE64
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build:mobile
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update
      - name: Fetch Ad Hoc signing files
        script: |
          set -e
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_ADHOC \
            --create \
            --verbose
          keychain add-certificates
          xcode-project use-profiles --project ios/App/App.xcodeproj
      - name: Build and export Ad Hoc IPA
        script: |
          set -e
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="$BUNDLE_ID" \
            CODE_SIGN_STYLE=Automatic \
            -allowProvisioningUpdates
          cat > /tmp/export_adhoc.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist /tmp/export_adhoc.plist \
            -exportPath build/ipa
          ls -la build/ipa/

    artifacts:
      - ios/App/build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - theoharis@getfitskg.com
        notify:
          success: true
          failure: true

  # Unsigned .ipa - compile test only (cannot install on iPhone)
  ios-unsigned:
    name: iOS Unsigned Build (Testing)
    max_build_duration: 90
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.siozostheoharis.getfit"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build:mobile
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update
      - name: Build unsigned IPA
        script: |
          set -e
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE_SPECIFIER="" \
            CODE_SIGN_IDENTITY=""
          mkdir -p build/ipa
          cp -r build/Build/Products/Release-iphoneos/App.app build/ipa/
          cd build/ipa
          zip -r App.ipa App.app
          rm -rf App.app
          ls -la App.ipa

    artifacts:
      - ios/App/build/ipa/*.ipa

    publishing:
      email:
        recipients:
          - theoharis@getfitskg.com
        notify:
          success: true
          failure: true

  # Simulator build (not .ipa)
  ios-development:
    name: iOS Development Build (Simulator)
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      vars:
        BUNDLE_ID: "com.siozostheoharis.getfit"
        APPLE_TEAM_ID: "K4A6LP6V3P"
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install npm dependencies
        script: npm ci
      - name: Build web assets
        script: npm run build:mobile
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Install CocoaPods dependencies
        script: |
          cd ios/App
          pod install --repo-update
      - name: Build for iOS Simulator
        script: |
          cd ios/App
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -sdk iphonesimulator \
            -configuration Debug \
            -derivedDataPath build
          ls -la build/Build/Products/Debug-iphonesimulator/

    artifacts:
      - ios/App/build/Build/Products/Debug-iphonesimulator/*.app

    publishing:
      email:
        recipients:
          - theoharis@getfitskg.com
        notify:
          success: true
          failure: true
